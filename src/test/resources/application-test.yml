spring:
  application:
    name: ai-auto-trade-test

# 테스트 환경에서는 OpenAI 모드로 설정 (실제 연결 없음)
llm:
  provider: openai
  timeout-seconds: 30
  retry-count: 3
  default-model: GEMINI_1_5_PRO

# 테스트용 OpenAI 설정 (빈 값)
openai:
  api-key: test-key

# Vertex AI 설정 (테스트에서는 사용 안함)
vertex:
  ai:
    project-id: test-project
    location: us-central1